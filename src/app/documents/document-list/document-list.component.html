<div class="card mt-3">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5>Documents</h5>
    <button class="btn btn-success" [routerLink]="['new']">
  Add Document
</button>
  </div>

  <div class="card-body">
     <div class="list-group">
       <cms-document-item
        *ngFor="let currentDocument of documents"
        [document]="currentDocument">
       </cms-document-item>
     </div>
  </div>
</div>
