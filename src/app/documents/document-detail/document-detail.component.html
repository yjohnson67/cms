<div class="card mt-3" *ngIf="document">
  <div class="card-header d-flex justify-content-between align-items-center">
    <h5>{{ document.name }}</h5>

    <div>
      <button class="btn btn-primary btn-sm me-2" (click)="onView()">
        View
      </button>

      <button class="btn btn-info btn-sm me-2" [routerLink]="['edit']">
       Edit
      </button>

      <button class="btn btn-danger btn-sm" (click)="onDelete()">
        Delete
      </button>
    </div>
  </div>

  <div class="card-body">
    <p><strong>URL:</strong></p>
    <a [href]="document.url" target="_blank">
  {{ document.url }}
</a>
  </div>
</div>
