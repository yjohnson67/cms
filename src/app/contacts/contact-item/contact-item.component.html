<a class="list-group-item clearfix">
  <div class="d-flex align-items-center justify-content-between">
    <div>
      <h4 class="list-group-item-heading">
        {{ contact.name }}
      </h4>
    </div>

    <img
      [src]="contact.imageUrl"
      alt="contact image"
      width="50"
      class="me-3 rounded-circle">
  </div>
</a>
